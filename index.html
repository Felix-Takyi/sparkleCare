<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SparkleCare Cleaning Services – Koforidua</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0B3C5D', dark: '#072a42', mid: '#134d74' },
            accent: { DEFAULT: '#F5C518', dark: '#d4a80f', light: '#fef9e7' }
          },
          fontFamily: {
            clash: ['Clash Display', 'sans-serif'],
            dm: ['DM Sans', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #ffffff; }
    h1, h2, h3, h4 { font-family: 'Clash Display', sans-serif; }
    @keyframes pulse-soft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    .modal-backdrop { background: rgba(11,60,93,0.6); backdrop-filter: blur(4px); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #0B3C5D; border-radius: 3px; }
    .btn-navy { transition: background 0.2s; }
    .btn-navy:hover { background: #072a42 !important; }
    .btn-wa:hover { background: #1ebc57 !important; }
    .btn-outline:hover { background: #0B3C5D !important; color: #fff !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const servicesData = {
      office: [
        { name: 'Small office/shop (one-time)', price: '200 – 400' },
        { name: 'Small office/shop (monthly contract)', price: '600 – 1,200' },
        { name: 'Medium office (monthly)', price: '1,200 – 2,500' },
      ],
      event: [
        { name: 'Small house party', price: '150 – 300' },
        { name: 'Birthday / engagement', price: '250 – 500' },
        { name: 'Wedding / large event', price: '500 – 1,000+' },
      ],
      movein: [
        { name: 'Single room', price: '120 – 200' },
        { name: 'Self-contained', price: '180 – 280' },
        { name: '2-bedroom', price: '300 – 450' },
        { name: '3-bedroom', price: '450 – 600' },
      ],
      addon: [
        { name: 'Fridge cleaning', price: '50 – 100' },
        { name: 'Cooker / oven cleaning', price: '50 – 120' },
        { name: 'Window cleaning', price: '50 – 150' },
        { name: 'Heavy stain removal', price: 'Inspection based' },
        { name: 'Extra dirty areas', price: 'Additional charge' },
      ],
    };

    const serviceTypes = ['Office & Shop Cleaning', 'Post-Event Cleanup', 'Move-In / Move-Out Cleaning', 'Add-On Services'];
    const addOnOptions = ['Fridge cleaning', 'Cooker / oven cleaning', 'Window cleaning', 'Heavy stain removal', 'Extra dirty areas'];

    function Logo() {
      return (
        <div className="flex items-center gap-2">
          <img src="./sparklecleanLogo.png" alt="SparkleCare Logo" className="h-12 w-auto flex-shrink-0" onError={(e) => { e.target.style.display = 'none'; }} />
          <img src="./sparklecleanTitle.png" alt="SparkleCare" className="h-10 w-auto" onError={(e) => { e.target.style.display = 'none'; }} />
        </div>
      );
    }

    function MainContent({ onOpenServices, onOpenBooking }) {
      return (
        <section className="flex flex-col lg:flex-row min-h-screen w-full">

          {/* IMAGE — full width on mobile (top), 60% on desktop (left) */}
          <div className="relative w-full h-[42vh] md:h-[48vh] lg:h-auto lg:w-3/5 flex-shrink-0 bg-navy-dark overflow-hidden">
            <div className="absolute -top-16 -left-16 w-64 h-64 rounded-full bg-accent/[0.07] pointer-events-none" />
            <div className="absolute -bottom-10 -right-10 w-48 h-48 rounded-full bg-white/[0.04] pointer-events-none" />
            <img
              src="./sparklecleanJanitor.png"
              alt="SparkleCare Professional Cleaner"
              className="w-full h-full object-cover object-top"
              onError={(e) => { e.target.style.display = 'none'; }}
            />
            <div className="absolute top-4 right-4 flex items-center gap-2 px-3 py-1.5 rounded-full text-white text-xs font-semibold bg-white/10 backdrop-blur-sm border border-white/20">
              <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse-soft inline-block" />
              Available Now
            </div>
          </div>

          {/* CONTENT — full width on mobile (bottom), 40% on desktop (right) */}
          <div className="w-full lg:w-2/5 flex flex-col justify-center px-6 py-10 md:px-10 lg:px-10 xl:px-12 bg-white">

            <Logo />

            <div className="inline-flex items-center gap-2 mt-5 px-3 py-1.5 rounded-full text-xs font-semibold text-navy border border-navy/20 bg-navy/[0.06] w-fit">
              <span className="w-1.5 h-1.5 rounded-full bg-accent inline-block" />
              Serving Koforidua
            </div>

            <h1 className="font-clash font-bold text-navy leading-tight mt-3 text-2xl md:text-3xl lg:text-2xl xl:text-3xl">
              Professional Cleaning for Your{' '}
              <span className="text-accent">Home or Office</span>
            </h1>

            <p className="text-sm text-gray-500 font-dm leading-relaxed mt-3 max-w-sm">
              Reliable, detail-oriented cleaning services that exceed expectations — homes, offices, events and more.
            </p>

            <div className="flex items-center gap-6 mt-5 flex-wrap">
              {[['200+','Homes Cleaned'],['4.9★','Rating'],['Same Day','Response']].map(([n, l]) => (
                <div key={l} className="text-center">
                  <div className="text-base font-bold text-navy font-clash">{n}</div>
                  <div className="text-[10px] text-gray-400 mt-0.5 font-dm">{l}</div>
                </div>
              ))}
            </div>

            <div className="h-px bg-gray-200 my-5" />

            <div className="flex flex-col gap-3">
              <button
                onClick={onOpenBooking}
                className="btn-navy w-full flex items-center justify-center gap-2 py-3 px-4 bg-navy text-white text-sm font-semibold font-dm rounded-xl border-none cursor-pointer"
              >
                📅 Book Now
              </button>

              <a
                href="https://wa.me/+233537666307?text=Hello%20SparkleCare,%20I%20want%20to%20inquire%20about%20your%20cleaning%20services."
                target="_blank"
                rel="noopener noreferrer"
                className="btn-wa w-full flex items-center justify-center gap-2 py-3 px-4 bg-[#25D366] text-white text-sm font-semibold font-dm rounded-xl cursor-pointer no-underline"
              >
                <svg className="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Chat on WhatsApp
              </a>

              <button
                onClick={onOpenServices}
                className="btn-outline w-full flex items-center justify-center gap-2 py-3 px-4 bg-transparent text-navy text-sm font-semibold font-dm rounded-xl border-2 border-navy cursor-pointer transition-colors"
              >
                🧹 View Services &amp; Pricing
              </button>
            </div>

            <p className="text-[11px] text-gray-400 font-dm text-center mt-5">
              📍 Koforidua, Eastern Region &nbsp;·&nbsp; 📞 0537 666 307
            </p>

          </div>
        </section>
      );
    }

    function ServicesModal({ isOpen, onClose }) {
      const [activeTab, setActiveTab] = useState(0);
      const tabs = ['Office & Shop', 'Post-Event', 'Move-In/Out', 'Add-Ons'];
      const tabKeys = ['office', 'event', 'movein', 'addon'];
      const tabHeaders = {
        office: { title: 'Office & Shop Cleaning', col1: 'Service Type', col2: 'Price (GHS)' },
        event: { title: 'Post-Event Cleanup', col1: 'Event Type', col2: 'Price (GHS)' },
        movein: { title: 'Move-In / Move-Out Cleaning (Deep Clean)', col1: 'Space', col2: 'Price (GHS)' },
        addon: { title: 'Optional Add-On Services', col1: 'Service', col2: 'Price (GHS)' }
      };
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 modal-backdrop" onClick={onClose}></div>
          <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[80vh] overflow-hidden">
            <div className="bg-navy p-6">
              <div className="flex justify-between items-center">
                <h3 className="text-2xl font-bold text-white font-clash">{tabHeaders[tabKeys[activeTab]].title}</h3>
                <button onClick={onClose} className="text-white/70 hover:text-white"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
              </div>
              <div className="flex gap-2 mt-4 overflow-x-auto pb-2">
                {tabs.map((tab, index) => (<button key={tab} onClick={() => setActiveTab(index)} className={`px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap transition-all font-dm ${activeTab === index ? 'bg-accent text-navy' : 'bg-white/10 text-white/70 hover:bg-white/20'}`}>{tab}</button>))}
              </div>
            </div>
            <div className="p-4 overflow-y-auto max-h-[calc(80vh-180px)]">
              <table className="w-full">
                <thead>
                  <tr className="border-b border-gray-200">
                    <th className="text-left py-3 px-4 font-semibold text-navy font-dm">{tabHeaders[tabKeys[activeTab]].col1}</th>
                    <th className="text-right py-3 px-4 font-semibold text-navy font-dm">{tabHeaders[tabKeys[activeTab]].col2}</th>
                  </tr>
                </thead>
                <tbody>
                  {servicesData[tabKeys[activeTab]].map((service, index) => (
                    <tr key={index} className="border-b border-gray-100 hover:bg-gray-50">
                      <td className="py-3 px-4 text-gray-800 font-dm">{service.name}</td>
                      <td className="py-3 px-4 text-right font-bold text-navy font-dm">{service.price}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    function BookingModal({ isOpen, onClose, onOpenPayment }) {
      const [formData, setFormData] = useState({ name: '', phone: '', serviceType: '', location: '', date: '', time: '', addons: [], notes: '' });
      const [locStatus, setLocStatus] = useState('');

      const getServicePrice = (serviceType) => {
        const keyMap = {
          'Office & Shop Cleaning': 'office',
          'Post-Event Cleanup': 'event',
          'Move-In / Move-Out Cleaning': 'movein',
          'Add-On Services': 'addon'
        };
        const key = keyMap[serviceType];
        if (key && servicesData[key]) {
          return servicesData[key][0].price;
        }
        return '';
      };

      const shareLocation = () => {
        if (!navigator.geolocation) { setLocStatus('Location not supported on this device.'); return; }
        setLocStatus('Detecting…');
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const coords = `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
            const mapsLink = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
            setFormData(prev => ({ ...prev, location: `${prev.location ? prev.location + ' | ' : ''}GPS: ${coords} (${mapsLink})` }));
            setLocStatus('✅ Location added!');
            setTimeout(() => setLocStatus(''), 3000);
          },
          () => { setLocStatus('⚠️ Could not get location. Please type it manually.'); setTimeout(() => setLocStatus(''), 4000); }
        );
      };

      const handleSubmit = () => {
        if (!formData.name || !formData.serviceType) {
          alert('Please fill in your name and select a service type');
          return;
        }
        const addonsText = formData.addons.length > 0 ? formData.addons.join(', ') : 'None';
        const message = `*BOOKING REQUEST - SparkleCare*\n\n👤 *Name:* ${formData.name}\n📞 *Phone:* ${formData.phone || 'Not provided'}\n🧹 *Service:* ${formData.serviceType}\n📍 *Location:* ${formData.location || 'Not provided'}\n📅 *Date:* ${formData.date || 'Not specified'}\n⏰ *Time:* ${formData.time || 'Not specified'}\n➕ *Add-ons:* ${addonsText}\n📝 *Notes:* ${formData.notes || 'None'}`;
        window.open(`https://wa.me/+233537666307?text=${encodeURIComponent(message)}`, '_blank');
      };

      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 modal-backdrop" onClick={onClose}></div>
          <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-hidden">
            <div className="bg-navy p-6">
              <div className="flex justify-between items-center">
                <h3 className="text-2xl font-bold text-white font-clash">Book a Service</h3>
                <button onClick={onClose} className="text-white/70 hover:text-white"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
              </div>
            </div>
            <div className="p-6 overflow-y-auto max-h-[calc(90vh-120px)]">
              <div className="space-y-4">
                <div><label className="block text-sm font-medium text-gray-700 mb-1 font-dm">Full Name *</label><input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy focus:border-transparent font-dm" placeholder="Your full name" /></div>
                <div><label className="block text-sm font-medium text-gray-700 mb-1 font-dm">Phone Number</label><input type="tel" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy focus:border-transparent font-dm" placeholder="0XX XXX XXXX" /></div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1 font-dm">Service Type *</label>
                  <select value={formData.serviceType} onChange={(e) => setFormData({...formData, serviceType: e.target.value})} className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy focus:border-transparent font-dm">
                    <option value="">Select a service</option>
                    {serviceTypes.map(type => (<option key={type} value={type}>{type}</option>))}
                  </select>
                  {formData.serviceType && (
                    <div className="mt-2 p-3 bg-accent-light rounded-lg">
                      <p className="text-sm text-navy font-dm">Starting from: <span className="font-bold">GHS {getServicePrice(formData.serviceType)}</span></p>
                    </div>
                  )}
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1 font-dm">Location / Address</label>
                  <input type="text" value={formData.location} onChange={(e) => setFormData({...formData, location: e.target.value})} className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy focus:border-transparent font-dm" placeholder="e.g. Koforidua, near Hospital" />
                  <button type="button" onClick={shareLocation} className="mt-2 flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-dm font-medium text-white bg-navy hover:bg-navy-dark transition-colors">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    Share My GPS Location
                  </button>
                  {locStatus && <p className="text-xs mt-1 text-gray-500 font-dm">{locStatus}</p>}
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div><label className="block text-sm font-medium text-gray-700 mb-1 font-dm">Preferred Date</label><input type="date" value={formData.date} min={new Date().toISOString().split('T')[0]} onChange={(e) => setFormData({...formData, date: e.target.value})} className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy focus:border-transparent font-dm" /></div>
                  <div><label className="block text-sm font-medium text-gray-700 mb-1 font-dm">Preferred Time</label><input type="time" value={formData.time} onChange={(e) => setFormData({...formData, time: e.target.value})} className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy focus:border-transparent font-dm" /></div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2 font-dm">Add-On Services</label>
                  <div className="grid grid-cols-2 gap-2">
                    {addOnOptions.map(opt => (
                      <label key={opt} className="flex items-center gap-2 p-2 rounded-lg border border-gray-200 cursor-pointer hover:border-navy transition-all">
                        <input type="checkbox" checked={formData.addons.includes(opt)} onChange={(e) => { const updated = e.target.checked ? [...formData.addons, opt] : formData.addons.filter(a => a !== opt); setFormData({...formData, addons: updated}); }} className="accent-navy" />
                        <span className="text-xs font-dm text-gray-700">{opt}</span>
                      </label>
                    ))}
                  </div>
                </div>
                <div><label className="block text-sm font-medium text-gray-700 mb-1 font-dm">Additional Notes</label><textarea value={formData.notes} onChange={(e) => setFormData({...formData, notes: e.target.value})} className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy focus:border-transparent font-dm resize-none" rows={3} placeholder="Any special instructions?" /></div>
                <button onClick={handleSubmit} className="w-full mt-2 px-6 py-4 bg-[#25D366] hover:bg-[#1ebc57] text-white font-semibold rounded-xl transition-colors font-dm">
                  📲 Send Booking via WhatsApp
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function PaymentModal({ isOpen, onClose }) {
      const [phone, setPhone] = useState('');
      const [amount, setAmount] = useState('');
      const [status, setStatus] = useState('idle');
      const handlePayment = () => { setStatus('processing'); setTimeout(() => { setStatus('success'); }, 2000); };
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 modal-backdrop" onClick={onClose}></div>
          <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div className="bg-navy p-6 text-center">
              <div className="w-16 h-16 bg-accent rounded-full flex items-center justify-center mx-auto mb-3"><svg className="w-8 h-8 text-navy" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></div>
              <h3 className="text-2xl font-bold text-white font-clash">Pay with MTN MoMo</h3>
              <p className="text-white/70 font-dm">Secure payment gateway</p>
            </div>
            <div className="p-6">
              {status === 'idle' && (<div className="space-y-4"><div><label className="block text-sm font-medium text-gray-700 mb-1 font-dm">Phone Number</label><input type="tel" value={phone} onChange={(e) => setPhone(e.target.value)} className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy focus:border-transparent font-dm" placeholder="+233 XX XXX XXXX" /></div><div><label className="block text-sm font-medium text-gray-700 mb-1 font-dm">Amount (GHS)</label><input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy focus:border-transparent font-dm" placeholder="0.00" /></div><button onClick={handlePayment} disabled={!phone || !amount} className="w-full px-6 py-4 bg-navy text-white font-semibold rounded-xl hover:bg-navy-dark transition-all disabled:opacity-50 disabled:cursor-not-allowed font-dm">Pay with MTN MoMo</button></div>)}
              {status === 'processing' && (<div className="text-center py-8"><div className="w-16 h-16 border-4 border-navy border-t-accent rounded-full mx-auto mb-4 animate-spin"></div><p className="text-lg font-medium text-gray-800 font-dm">Processing payment...</p><p className="text-gray-500 font-dm">Please wait</p></div>)}
              {status === 'success' && (<div className="text-center py-8"><div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4"><svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg></div><p className="text-xl font-bold text-gray-800 font-clash">Payment Successful!</p><p className="text-gray-500 mt-2 font-dm">Your booking has been confirmed</p><button onClick={onClose} className="mt-6 px-8 py-3 bg-navy text-white font-semibold rounded-xl hover:bg-navy-dark transition-all font-dm">Done</button></div>)}
